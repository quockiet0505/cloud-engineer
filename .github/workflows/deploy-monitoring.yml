name: Deploy Monitoring Stack

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Get MIG instance dynamically
      - name: Get MIG instance
        run: |
          MIG_NAME=$(gcloud compute instance-groups managed list \
            --project=voltarocks-42-sandbox \
            --zones asia-southeast1-a \
            --filter="baseInstanceName=cloud-engineer" \
            --format="value(name)")

          if [ -z "$MIG_NAME" ]; then
            echo "No MIG found!"
            exit 1
          fi

          INSTANCE=$(gcloud compute instance-groups managed list-instances $MIG_NAME \
            --project=voltarocks-42-sandbox \
            --zone asia-southeast1-a \
            --format="value(instance.basename())" | head -n 1)

          if [ -z "$INSTANCE" ]; then
            echo "No instance found!"
            exit 1
          fi

          echo "INSTANCE_NAME=$INSTANCE" >> $GITHUB_ENV

      # Wait until VM status = RUNNING
      - name: Wait for VM to be RUNNING
        run: |
          echo "Waiting for VM to be RUNNING..."
          until gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
            --zone asia-southeast1-a \
            --project voltarocks-42-sandbox \
            --format="get(status)" | grep -q RUNNING; do
              echo "VM not ready yet..."
              sleep 5
            done
          echo "VM is RUNNING."

      # Wait until SSH is ready 
      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH via IAP..."
          until gcloud compute ssh ${{ env.INSTANCE_NAME }} \
            --zone asia-southeast1-a \
            --project voltarocks-42-sandbox \
            --tunnel-through-iap \
            --quiet \
            --command="echo 'SSH ready'" &>/dev/null; do
              echo "SSH not ready yet..."
              sleep 5
            done
          echo "SSH is ready."

      # Prepare monitoring directory
      - name: Prepare directory on VM
        run: |
          gcloud compute ssh ${{ env.INSTANCE_NAME }} \
            --zone asia-southeast1-a \
            --project voltarocks-42-sandbox \
            --tunnel-through-iap \
            --quiet \
            --command="sudo mkdir -p /opt/monitoring"

      # Copy files to home directory
      - name: Copy files to VM
        run: |
          gcloud compute scp \
            infra/monitoring/docker-compose.monitoring.yml \
            infra/monitoring/prometheus.yml \
            ${{ env.INSTANCE_NAME }}:~/ \
            --zone asia-southeast1-a \
            --project voltarocks-42-sandbox \
            --tunnel-through-iap \
            --quiet

      # Move and deploy
      - name: Deploy stack
        run: |
          gcloud compute ssh ${{ env.INSTANCE_NAME }} \
            --zone asia-southeast1-a \
            --project voltarocks-42-sandbox \
            --tunnel-through-iap \
            --quiet \
            --command="
              sudo mv ~/docker-compose.monitoring.yml /opt/monitoring/ &&
              sudo mv ~/prometheus.yml /opt/monitoring/ &&
              cd /opt/monitoring &&
              sudo docker stack deploy -c docker-compose.monitoring.yml core_stack
            "